name: Mirror to Codeberg

on:
  push:
    branches: [ main ]  # Adjust if you're using a different branch

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "Miniblox Sync Bot"
          git config --global user.email "syncbot@miniblox.dev"

      - name: Push to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git remote add codeberg https://oauth2:${CODEBERG_TOKEN}@codeberg.org/ee6-lang/MinibloxV4.git
          git push codeberg main
